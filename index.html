<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <title>Donation Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Donation Management System</h1>

    <p class="subtitle">
        Manavta Hitay Seva Chatra Old Age Home Donation Portal
    </p>

    <!-- Statistics -->

    <div class="stats">

        <div class="card">
            <h3>Total Donations</h3>
            <span id="totalDonations">0</span>
        </div>

        <div class="card">
            <h3>Unique Donors</h3>
            <span id="uniqueDonors">0</span>
        </div>

        <div class="card">
            <h3>Inventory Items</h3>
            <span id="inventoryItems">0</span>
        </div>

    </div>

    <!-- Donation Form -->

    <div class="form-box">

        <input type="text" id="item" placeholder="Item Name">

        <input type="text" id="quantity" placeholder="Quantity (e.g. 5 Kg)">

        <input type="text" id="donor" placeholder="Donor Name">

        <input type="date" id="date">

        <button onclick="addDonation()">
            Add Donation
        </button>

    </div>

    <!-- Action Buttons -->

    <div class="action-buttons">

        <button onclick="printDonations()">
            Print Donations
        </button>

        <button onclick="printSummary()">
            Print Summary
        </button>

    </div>

    <!-- Donation Records -->

    <div class="table-section">

        <h2>Donation Records</h2>

        <table>

            <thead>
                <tr>
                    <th>Sr No</th>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Donor</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody id="donationTable">
            </tbody>

        </table>

    </div>

    <!-- Inventory Summary -->

    <div class="table-section">

        <h2>Inventory Summary</h2>

        <table class="summary-table">

            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Total Quantity Available</th>
                </tr>
            </thead>

            <tbody id="summaryTable">
            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>
<script>

if ("serviceWorker" in navigator) {

  window.addEventListener("load", () => {

    navigator.serviceWorker.register("./sw.js")
      .then(() => {
        console.log("Service Worker Registered");
      });

  });

}

</script>
</body>
</html>
